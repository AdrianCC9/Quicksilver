name: Quicksilver CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: quicksilver_root
          MYSQL_DATABASE: quicksilver
          MYSQL_USER: quicksilver
          MYSQL_PASSWORD: quicksilver
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uquicksilver -pquicksilver"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install local dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/dev.txt

      - name: Compile source
        run: |
          python -m compileall analytics alerts config dashboard ingestion migrations models orchestration pipelines scripts sentiment simulation storage streaming transformations

      - name: Lint source
        run: ruff check .

      - name: Run tests
        env:
          STORAGE_BACKEND: mysql
          SENTIMENT_BACKEND: lexicon
          PUBLIC_NEWS_ENABLED: "false"
        run: pytest -q

      - name: Run MySQL integration smoke
        env:
          RUN_MYSQL_INTEGRATION: "true"
          DATABASE_URL: mysql+pymysql://quicksilver:quicksilver@127.0.0.1:3306/quicksilver?charset=utf8mb4
          STORAGE_BACKEND: mysql
          SENTIMENT_BACKEND: lexicon
        run: pytest -q tests/test_mysql_integration.py

      - name: Validate compose file
        run: docker compose --profile local-pipeline --profile dashboard config

      - name: Build local image
        run: docker build -f docker/Dockerfile.local -t quicksilver-local-ci .
